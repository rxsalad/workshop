# ClusterIP Service: Internal-only access within the cluster
apiVersion: v1
kind: Service
metadata:
  name: vllm-internal
spec:
  type: ClusterIP
  selector:
    app: vllm-llama
  ports:
    - name: openai-api
      port: 80           # Internal port in the cluster
      targetPort: 8000   # Container port - vLLM server
      protocol: TCP
---

# NodePort Service: Exposes the service on all nodes at a fixed port
apiVersion: v1
kind: Service
metadata:
  name: vllm-nodeport
spec:
  type: NodePort
  selector:
    app: vllm-llama
  ports:
    - name: openai-api
      port: 80           # Internal port in the cluster
      targetPort: 8000   # Container port - vLLM server
      nodePort: 30080    # External port on the node
      protocol: TCP
  externalTrafficPolicy: Cluster      # Distributes traffic across all nodes (including those without the pod)
---
